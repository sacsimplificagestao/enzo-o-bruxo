<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Enzo O Bruxo — É O BRUXO HEIN!</title>
<meta name="description" content="Links oficiais de Enzo O Bruxo. Assista, contrate shows e publicidade. É O BRUXO HEIN!" />
<meta name="theme-color" content="#02100a" />

<!-- Open Graph / compartilhamento -->
<meta property="og:title" content="Enzo O Bruxo — É O BRUXO HEIN!" />
<meta property="og:description" content="Assista Brega do Bruxo 3.0, contrate shows e publicidade." />
<meta property="og:image" content="assets/avatar.jpg" />
<meta property="og:type" content="website" />

<link rel="icon" type="image/png" href="assets/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:#02100a;            /* preto esverdeado */
    --neon:#19ff7a;          /* verde principal */
    --neon-2:#00ffc3;        /* esmeralda/ciano-verde */
    --neon-3:#aaff32;        /* lima */
    --txt:#eafff4;
    --muted:#86c7a6;
    --card:rgba(255,255,255,.04);
    --card-brd:rgba(25,255,122,.30);
    --maxw:480px;            /* largura "celular" mesmo no PC */
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Rajdhani',system-ui,sans-serif;
    background:var(--bg);
    color:var(--txt);
    min-height:100dvh;
    display:flex;
    justify-content:center;
    overflow-x:hidden;
    position:relative;
  }

  /* ===== FUNDO FUTURISTA (FUMAÇA VERDE) ===== */
  .bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  /* grade neon em perspectiva */
  .grid{
    position:absolute;left:-50%;right:-50%;bottom:-10%;height:70%;
    background-image:
      linear-gradient(rgba(25,255,122,.16) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,195,.12) 1px, transparent 1px);
    background-size:46px 46px;
    transform:perspective(340px) rotateX(62deg);
    transform-origin:bottom center;
    mask-image:linear-gradient(to top, #000 0%, transparent 85%);
    -webkit-mask-image:linear-gradient(to top, #000 0%, transparent 85%);
    animation:gridmove 14s linear infinite;
  }
  @keyframes gridmove{from{background-position:0 0,0 0;}to{background-position:0 46px,46px 0;}}
  /* fumaça verde (orbes de luz) */
  .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.55;}
  .orb.a{width:360px;height:360px;background:var(--neon);top:-100px;left:-90px;animation:float1 11s ease-in-out infinite;}
  .orb.b{width:320px;height:320px;background:var(--neon-2);top:28%;right:-120px;animation:float2 13s ease-in-out infinite;}
  .orb.c{width:300px;height:300px;background:var(--neon-3);bottom:-90px;left:18%;opacity:.4;animation:float1 15s ease-in-out infinite;}
  @keyframes float1{0%,100%{transform:translateY(0) translateX(0);}50%{transform:translateY(34px) translateX(20px);}}
  @keyframes float2{0%,100%{transform:translateY(0) translateX(0);}50%{transform:translateY(-30px) translateX(-22px);}}
  /* vinheta */
  .bg-layer::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 50% 0%, transparent 28%, rgba(2,16,10,.88) 100%);}

  /* ===== CONTAINER (modo celular) ===== */
  .phone{
    position:relative;z-index:1;
    width:100%;max-width:var(--maxw);
    min-height:100dvh;
    padding:clamp(22px,6vw,40px) clamp(20px,5vw,30px) 40px;
    display:flex;flex-direction:column;align-items:center;
    text-align:center;
  }

  /* ===== LOGO ===== */
  .logo{
    width:min(80%,310px);height:auto;margin-top:6px;
    filter:drop-shadow(0 0 14px rgba(25,255,122,.55));
    animation:logoIn .9s cubic-bezier(.2,.9,.2,1) both, logoPulse 4.5s ease-in-out 1s infinite;
  }
  @keyframes logoIn{from{opacity:0;transform:translateY(-18px) scale(.94);}to{opacity:1;transform:none;}}
  @keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 12px rgba(25,255,122,.45));}50%{filter:drop-shadow(0 0 26px rgba(0,255,195,.75));}}

  /* ===== AVATAR (player tocando) ===== */
  .photo-wrap{
    margin-top:30px;position:relative;
    width:clamp(160px,46vw,196px);aspect-ratio:1/1;
    border-radius:50%;
    display:grid;place-items:center;
    animation:photoIn .9s .15s cubic-bezier(.2,.9,.2,1) both;
  }
  @keyframes photoIn{from{opacity:0;transform:scale(.8);}to{opacity:1;}}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* aro colorido girando (o "negocio atras mexendo") + glow que respira */
  .photo-wrap::before{
    content:"";position:absolute;inset:0;border-radius:50%;z-index:0;
    background:conic-gradient(from 0deg,var(--neon),var(--neon-2),var(--neon-3),var(--neon-2),var(--neon));
    animation:spin 5s linear infinite, ringGlow 4s ease-in-out 1s infinite;
  }
  @keyframes ringGlow{0%,100%{box-shadow:0 0 26px rgba(25,255,122,.42);}50%{box-shadow:0 0 42px rgba(0,255,195,.65);}}

  /* ondas de som saindo (tipo player tocando) */
  .pulse{
    position:absolute;inset:0;border-radius:50%;z-index:0;
    border:2px solid var(--neon);
    animation:wave 2.6s ease-out infinite;
  }
  .pulse.d2{animation-delay:1.3s;}
  @keyframes wave{0%{transform:scale(.96);opacity:.55;}100%{transform:scale(1.42);opacity:0;}}

  /* a FOTO fica 100% parada, em pé */
  .photo-wrap img{
    position:relative;z-index:1;
    width:calc(100% - 8px);height:calc(100% - 8px);
    object-fit:cover;object-position:50% 28%;
    border-radius:50%;display:block;
    border:3px solid var(--bg);
  }

  /* equalizer (player tocando) */
  .eq{
    position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);z-index:3;
    display:flex;align-items:flex-end;gap:3px;height:18px;
    padding:5px 9px;border-radius:99px;
    background:rgba(2,16,10,.82);border:1px solid var(--card-brd);
    backdrop-filter:blur(4px);box-shadow:0 0 14px -2px var(--neon);
  }
  .eq i{width:3px;height:100%;border-radius:2px;background:var(--neon);transform-origin:bottom;
    animation:eq .9s ease-in-out infinite;}
  .eq i:nth-child(2){animation-delay:.18s;background:var(--neon-2);}
  .eq i:nth-child(3){animation-delay:.36s;}
  .eq i:nth-child(4){animation-delay:.54s;background:var(--neon-2);}
  .eq i:nth-child(5){animation-delay:.72s;}
  @keyframes eq{0%,100%{transform:scaleY(.28);}50%{transform:scaleY(1);}}

  /* selo do lançamento */
  .live{
    position:absolute;top:6px;right:2px;z-index:3;
    display:flex;align-items:center;gap:5px;
    background:rgba(2,16,10,.85);border:1px solid var(--neon);
    color:var(--neon);font-weight:700;font-size:10px;letter-spacing:1px;
    padding:4px 9px;border-radius:99px;backdrop-filter:blur(4px);
    box-shadow:0 0 12px rgba(25,255,122,.6);
  }
  .live::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--neon);
    box-shadow:0 0 8px var(--neon);animation:livedot 1.4s ease-in-out infinite;}
  @keyframes livedot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.7);}}

  /* ===== SLOGAN (única coisa abaixo) ===== */
  .slogan{
    font-family:'Orbitron',sans-serif;font-weight:900;
    margin-top:22px;letter-spacing:4px;font-size:clamp(18px,5.2vw,24px);
    text-transform:uppercase;
    background:linear-gradient(90deg,#fff,var(--neon-2),var(--neon),#fff);
    background-size:220% auto;-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 18px rgba(25,255,122,.25);
    animation:shine 5s linear infinite, fadeUp .8s .25s both;
  }
  @keyframes shine{to{background-position:220% center;}}

  /* ===== MENU / LINKS ===== */
  .links{width:100%;margin-top:32px;display:flex;flex-direction:column;gap:15px;}
  .btn{
    --c:var(--neon);
    position:relative;display:flex;align-items:center;gap:15px;
    width:100%;padding:16px 18px;
    border:1px solid var(--card-brd);border-radius:18px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    color:var(--txt);text-decoration:none;
    font-weight:600;font-size:16px;letter-spacing:.3px;
    overflow:hidden;cursor:pointer;isolation:isolate;
    transition:transform .25s cubic-bezier(.2,.9,.2,1), box-shadow .3s, border-color .3s, background .3s;
    opacity:0;transform:translateY(14px);
    animation:fadeUp .6s forwards;
  }
  .btn:nth-of-type(1){animation-delay:.45s;}
  .btn:nth-of-type(2){animation-delay:.55s;}
  .btn:nth-of-type(3){animation-delay:.65s;}
  .btn:nth-of-type(4){animation-delay:.75s;}
  /* barra de cor lateral viva */
  .btn::after{
    content:"";position:absolute;left:0;top:0;bottom:0;width:4px;
    background:var(--c);box-shadow:0 0 14px var(--c);
    transform:scaleY(.4);opacity:.6;transition:transform .3s,opacity .3s;
  }
  /* brilho que cruza o botão */
  .btn::before{
    content:"";position:absolute;top:0;left:-120%;width:60%;height:100%;z-index:-1;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.16),transparent);
    transform:skewX(-20deg);transition:left .6s;
  }
  .btn:hover,.btn:focus-visible,.btn.demo{
    transform:translateY(-3px);
    border-color:var(--c);
    background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.03));
    box-shadow:0 0 26px -4px var(--c),0 14px 34px -14px rgba(0,0,0,.7),inset 0 0 22px -14px var(--c);
  }
  .btn:hover::after,.btn:focus-visible::after,.btn.demo::after{transform:scaleY(1);opacity:1;}
  .btn:hover::before,.btn:focus-visible::before,.btn.demo::before{left:130%;}
  .btn:active{transform:translateY(-1px) scale(.99);}

  .btn .ico{
    flex:0 0 46px;height:46px;display:grid;place-items:center;
    border-radius:14px;font-size:22px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 0 16px -6px var(--c);
    transition:transform .35s, box-shadow .35s;
  }
  .btn:hover .ico,.btn.demo .ico{transform:scale(1.12) rotate(-6deg);box-shadow:0 0 20px -4px var(--c);}
  .btn .txt{display:flex;flex-direction:column;align-items:flex-start;line-height:1.18;text-align:left;}
  .btn .txt small{font-weight:500;font-size:12px;color:var(--muted);letter-spacing:.5px;margin-top:2px;}
  .btn .arrow{margin-left:auto;font-size:17px;color:var(--muted);transition:transform .3s,color .3s;}
  .btn:hover .arrow,.btn.demo .arrow{transform:translateX(4px);color:var(--c);}

  /* cores por botão */
  .btn.yt{--c:#ff3b30;}
  .btn.spotify{--c:#1ed760;}
  .btn.zap{--c:#19ff7a;}
  .btn.publi{--c:#aaff32;}

  /* ===== REDES (linha de ícones) ===== */
  .social{display:flex;gap:14px;margin-top:26px;}
  .social a{
    width:46px;height:46px;display:grid;place-items:center;border-radius:50%;
    border:1px solid var(--card-brd);background:rgba(255,255,255,.04);
    color:var(--txt);font-size:18px;text-decoration:none;
    transition:transform .25s,border-color .25s,box-shadow .25s,color .25s;
  }
  .social a:hover{transform:translateY(-3px) scale(1.08);border-color:var(--neon);color:var(--neon);box-shadow:0 0 18px -4px var(--neon);}

  /* ===== RODAPÉ ===== */
  .foot{margin-top:auto;padding-top:30px;color:var(--muted);font-size:12px;letter-spacing:1px;animation:fadeUp .8s .9s both;}
  .foot b{color:var(--neon);font-family:'Orbitron',sans-serif;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

  /* respeita quem não quer animação */
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

  /* moldura "celular" só em telas grandes */
  @media (min-width:560px){
    body{align-items:center;padding:24px 0;background:#010805;}
    .phone{
      min-height:auto;border-radius:40px;
      border:1px solid rgba(25,255,122,.22);
      box-shadow:0 0 0 1px rgba(255,255,255,.03),0 30px 80px -20px rgba(0,0,0,.9),0 0 70px -10px rgba(25,255,122,.35);
      background:linear-gradient(180deg,rgba(6,30,18,.6),rgba(2,16,10,.6));
      backdrop-filter:blur(2px);
      padding-bottom:34px;
    }
  }
</style>
</head>
<body>
  <div class="bg-layer">

  <main class="phone">

    </nav>

    <footer class="foot">© <span id="ano"></span> <b>ENZO O BRUXO</b> · Todos os direitos reservados</footer>
  </main>

  <script>
    document.getElementById('ano').textContent = new Date().getFullYear();

    // Auto-demo: ~3s depois de abrir, passa um "brilho" por cada botao em sequencia
    if (!window.matchMedia('(prefers-reduced-motion:reduce)').matches){
      const btns = [...document.querySelectorAll('.btn')];
      setTimeout(()=>{
        btns.forEach((b,i)=>{
          setTimeout(()=>{
            b.classList.add('demo');
            setTimeout(()=>b.classList.remove('demo'), 650);
          }, i*260);
        });
      }, 3000);
    }

    if (window.matchMedia('(hover:hover)').matches){
      document.querySelectorAll('.btn').forEach(b=>{
        b.addEventListener('mousemove',e=>{
          const r=b.getBoundingClientRect();
          const x=(e.clientX-r.left)/r.width-.5;
          b.style.transform=`translateY(-3px) perspective(600px) rotateY(${x*4}deg)`;
        });
        b.addEventListener('mouseleave',()=>{b.style.transform='';});
      });
    }
  </script>
</body>
</html>
